name: ai_student_career
description: AI Student Career - 职业能力测评与岗位匹配平台
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI组件
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 网络请求
  dio: ^5.4.0
  json_annotation: ^4.8.1
  pretty_dio_logger: ^1.3.1

  # 本地存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # 路由导航
  go_router: ^13.0.0

  # 图表库 - 性能优秀
  fl_chart: ^0.66.0

  # 工具类
  intl: ^0.19.0
  uuid: ^4.3.1
  url_launcher: ^6.2.2
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  open_filex: ^4.3.4

  # SSE流式传输
  http: ^1.1.2
  async: ^2.11.0

  # 日期时间处理
  timeago: ^3.6.0

  # 下拉刷新
  pull_to_refresh: ^2.0.0

  # Webview(如需要)
  webview_flutter: ^4.4.2

  # 平台服务
  flutter_platform_widgets: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.7

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700
